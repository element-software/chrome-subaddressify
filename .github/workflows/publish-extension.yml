# Publishes the Chrome extension to the Web Store on every v* tag push.
#
# Required GitHub secrets (Settings → Secrets → Actions):
#   CHROME_EXTENSION_ID   — the extension ID from the Chrome Web Store URL
#   CHROME_CLIENT_ID      — OAuth2 client ID from Google Cloud Console
#   CHROME_CLIENT_SECRET  — OAuth2 client secret
#   CHROME_REFRESH_TOKEN  — OAuth2 refresh token (see docs/publishing.md)
#
# Developer workflow:
#   node scripts/bump-version.mjs 1.2.0
#   git push --follow-tags

name: Publish Extension

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Build & publish to Chrome Web Store
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify tag matches manifest version
        run: |
          TAG="${{ github.ref_name }}"          # e.g. v1.2.0
          MANIFEST_VERSION=$(node -p "require('./apps/extension/manifest.json').version")
          EXPECTED="v${MANIFEST_VERSION}"
          if [ "$TAG" != "$EXPECTED" ]; then
            echo "❌ Tag '$TAG' does not match manifest version '$EXPECTED'"
            exit 1
          fi
          echo "✅ Version check passed: $TAG"

      - name: Build extension
        run: pnpm build:extension

      - name: Zip extension
        run: pnpm zip:extension

      - name: Publish to Chrome Web Store
        run: |
          ZIP="releases/subaddressify-${{ github.ref_name }}.zip"
          TIMEOUT=3600
          INTERVAL=300
          START=$(date +%s)

          while true; do
            OUTPUT=$(npx chrome-webstore-upload-cli@3 upload \
              --source "$ZIP" \
              --extension-id "${{ secrets.CHROME_EXTENSION_ID }}" \
              --client-id "${{ secrets.CHROME_CLIENT_ID }}" \
              --client-secret "${{ secrets.CHROME_CLIENT_SECRET }}" \
              --refresh-token "${{ secrets.CHROME_REFRESH_TOKEN }}" \
              --auto-publish 2>&1) && EXIT_CODE=0 || EXIT_CODE=$?

            echo "$OUTPUT"

            if [ $EXIT_CODE -eq 0 ]; then
              echo "Upload successful"
              break
            fi

            if echo "$OUTPUT" | grep -q "ITEM_NOT_UPDATABLE"; then
              ELAPSED=$(( $(date +%s) - START ))
              if [ $ELAPSED -ge $TIMEOUT ]; then
                echo "Timed out after 60 minutes waiting for item to become updatable"
                exit 1
              fi
              WAIT=$(( INTERVAL < (TIMEOUT - ELAPSED) ? INTERVAL : (TIMEOUT - ELAPSED) ))
              echo "Item not updatable (pending review or ready to publish). Retrying in ${WAIT}s... (${ELAPSED}s elapsed of ${TIMEOUT}s timeout)"
              sleep $WAIT
            else
              echo "Upload failed with unexpected error"
              exit 1
            fi
          done

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ZIP="releases/subaddressify-${{ github.ref_name }}.zip"
          gh release create "${{ github.ref_name }}" "$ZIP" \
            --title "${{ github.ref_name }}" \
            --generate-notes
